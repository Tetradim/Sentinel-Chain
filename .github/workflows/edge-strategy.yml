name: Chain Edge Strategy

on:
  push:
    branches: [main]
    paths:
      - 'src/sentinel_chain/edge_strategy.py'
      - 'src/sentinel_chain/edge_actions.py'
      - 'src/sentinel_chain/bot_event_bus.py'
      - 'src/sentinel_chain/intake.py'
      - 'tests/test_edge_strategy.py'
      - '.github/workflows/edge-strategy.yml'
  workflow_dispatch:

jobs:
  edge-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e '.[dev]'
      - name: Compile communication runtime
        run: |
          python -m py_compile \
            src/sentinel_chain/edge_strategy.py \
            src/sentinel_chain/edge_actions.py \
            src/sentinel_chain/bot_event_bus.py \
            src/sentinel_chain/intake.py
      - name: Run Edge strategy regressions
        run: pytest -q tests/test_edge_strategy.py
